name: Canary

# Runs the real-engine feature-acceptance canary (`pnpm canary`) between releases
# — nightly, on demand, and on PRs labeled `run-canary` — on a Windows runner and
# (as a second, explicit job) a macOS arm64 runner. A third macOS job runs the
# bundled engine-host smoke of the packaged .app (schedule/dispatch only).
# Intentionally NOT a required check. Full story: docs/RELEASE-CANARY.md
# ("Running it in CI"). The Windows canary job mirrors release.yml's build-windows
# job; the macOS jobs mirror the local `release:macos` bundle path
# (build:shell:macos-arm64 + smoke:packaged-macos) — keep them in lockstep when
# bumping actions or steps.

on:
  workflow_dispatch:
  schedule:
    # Nightly at a quiet hour (off the top of the hour to dodge the cron rush).
    - cron: "17 6 * * *"
  pull_request:
    # `labeled` is included so adding the `run-canary` label to an already-open
    # PR triggers a run without needing a new push.
    types: [opened, synchronize, reopened, labeled]

# The canary only reads the repo and uploads workflow artifacts.
permissions:
  contents: read

# Supersede older runs on the same ref. The event name is part of the group so
# a nightly run on main never cancels an in-flight manual dispatch (or vice
# versa); PR pushes still cancel their own superseded runs.
concurrency:
  group: canary-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  canary:
    name: Real-engine canary (Windows)
    # On pull_request events, only run when the PR carries the `run-canary`
    # label; dispatch and schedule runs are unconditional.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-canary')
    runs-on: windows-latest
    timeout-minutes: 90

    env:
      PAYLOAD_PLATFORM: windows-x64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # corepack must run before setup-node: the pnpm cache resolver needs pnpm on PATH
      - name: Enable pnpm from packageManager
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Unlike release.yml: the canary's only Rust build is build:external-bins,
          # which runs in the root Cargo workspace (no Tauri shell bundle here).
          workspaces: . -> target

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 21
          # no gradle cache: gradle files only exist inside engine/upstream after vendoring

      - name: Cache payload downloads
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: installer/.payload-cache/windows-x64
          key: payload-windows-x64-${{ runner.os }}-${{ hashFiles('installer/PINS.windows-x64.env', 'installer/ocrmypdf-windows-requirements.txt', 'engine/PINNED_TAG') }}
          restore-keys: |
            payload-windows-x64-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Everything else `pnpm canary` needs is (re)built downstream: the prepare
      # step's MCP build compiles the engine/rules package chain, and the canary's
      # Playwright webServer builds the UI. Only help-content (resolved by the UI
      # via its dist/) is built by nothing else.
      - name: Build help content
        run: pnpm --filter @raiopdf/help-content build

      # Assembles payload/windows-x64 + bundled MCP runtime + external bins
      # (target/release/raiopdf-engine-host.exe) — everything `pnpm canary` boots.
      - name: Prepare shell bundle (payload + external bins)
        shell: bash
        run: pnpm prepare:shell-bundle:windows-x64

      - name: Verify Windows payload
        shell: bash
        run: node installer/run-payload-assembler.mjs --platform windows-x64 --verify

      - name: Install Playwright Chromium
        shell: bash
        run: pnpm --filter @raiopdf/ui exec playwright install chromium

      # Drives the real UI and the real MCP connector against the real payload
      # engine through every advertised feature. See docs/RELEASE-CANARY.md.
      - name: Feature-acceptance canary
        shell: bash
        run: pnpm canary

      - name: Upload Playwright traces and results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          # Per-platform name: upload-artifact v4+ forbids two jobs uploading the
          # same immutable artifact name (the macOS canary uses -macos-arm64).
          name: canary-playwright-results-windows-x64
          path: apps/ui/test-results/
          if-no-files-found: ignore
          retention-days: 7

  canary-macos:
    name: Real-engine canary (macOS arm64)
    # Same PR-label gate as the Windows job: this job is expensive, so on
    # pull_request events it only runs when the PR carries `run-canary`; dispatch
    # and schedule runs are unconditional.
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'run-canary')
    runs-on: macos-15
    timeout-minutes: 90

    env:
      PAYLOAD_PLATFORM: macos-arm64
      # The bundle targets macOS 14 (apps/shell/src-tauri/tauri.macos.conf.json).
      # The assembler exports this for its own native builds, but the separate
      # build:external-bins Rust build does not inherit it — pin it job-wide so
      # every macOS build step agrees on the floor. Do NOT copy ci.yml's stale 13.0.
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert Apple Silicon runner
        run: test "$(uname -m)" = "arm64"

      # The macOS assembler builds Tesseract/Ghostscript/qpdf from pinned source.
      # Tesseract runs ./autogen.sh, which needs autoconf/automake/libtool — the
      # macos-15 image ships cmake/pkg-config but not those. Install them and probe
      # the rest so a missing tool fails here with a clear message, not mid-build.
      - name: Install native build prerequisites
        run: |
          brew install autoconf automake libtool
          for tool in cmake make clang pkg-config autoreconf; do
            command -v "$tool" >/dev/null 2>&1 || { echo "missing required build tool: $tool" >&2; exit 1; }
          done

      # corepack must run before setup-node: the pnpm cache resolver needs pnpm on PATH
      - name: Enable pnpm from packageManager
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # apps/shell/src-tauri is a root Cargo workspace member and
          # build:external-bins writes the engine-host into root target/release, so
          # the mac jobs share the root workspace target (same as the Windows job).
          workspaces: . -> target

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          # Stirling's classfiles are Java 25 (docs/ENGINE-VENDORING.md); Gradle
          # launches on this JDK. Do NOT copy the Windows job's Java 21.
          java-version: 25
          # no gradle cache: gradle files only exist inside engine/upstream after vendoring

      - name: Cache payload downloads and native prefixes
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Cache ONLY the reusable state — verified downloads and the compiled
          # native prefixes. NEVER cache work/ (throwaway build trees): an
          # `!.../work` exclusion would not hold, because the cache resolver tars the
          # parent with implicit descendants disabled. No restore-keys: a stale
          # native prefix passes the assembler's existence-only guards, so a
          # partial-key restore after a pin/recipe change would ship old binaries.
          # The assembler script is hashed in so a recipe change invalidates the key.
          path: |
            installer/.payload-cache/macos-arm64/downloads
            installer/.payload-cache/macos-arm64/prefix
          key: payload-macos-arm64-${{ hashFiles('installer/PINS.macos-arm64.env', 'installer/ocrmypdf-macos-requirements.txt', 'engine/PINNED_TAG', 'installer/assemble-macos-arm64.sh') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # help-content is resolved by the UI via its generated dist/ and is built by
      # nothing else — build it before the canary boots the UI (mirrors Windows).
      - name: Build help content
        run: pnpm --filter @raiopdf/help-content build

      - name: Disk before payload prep
        run: df -h /

      # Assembles payload/macos-arm64 (native OCR tools from source, JRE, Stirling
      # JAR, MCP runtime) + external bins (target/release/raiopdf-engine-host).
      - name: Prepare shell bundle (payload + external bins)
        run: pnpm prepare:shell-bundle:macos-arm64

      - name: Disk and payload sizes after payload prep
        run: |
          df -h /
          du -sh installer/.payload-cache/macos-arm64 apps/shell/src-tauri/payload/macos-arm64 target || true

      - name: Verify macOS payload
        run: node installer/run-payload-assembler.mjs --platform macos-arm64 --verify

      # `pnpm canary` only needs the assembled payload + the engine-host binary, so
      # drop the throwaway native build trees before it to keep the ~14 GB SSD
      # clear. Neither path is cached (only downloads/ + prefix/ are), so this never
      # affects a cache save.
      - name: Prune native build trees before canary
        run: |
          rm -rf installer/.payload-cache/macos-arm64/work engine/upstream
          df -h /

      - name: Install Playwright Chromium
        run: pnpm --filter @raiopdf/ui exec playwright install chromium

      # Drives the real UI and the real MCP connector against the real payload
      # engine through every advertised feature. See docs/RELEASE-CANARY.md.
      - name: Feature-acceptance canary
        run: pnpm canary

      - name: Disk after canary
        if: always()
        run: df -h /

      - name: Upload Playwright traces and results
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: canary-playwright-results-macos-arm64
          path: apps/ui/test-results/
          if-no-files-found: ignore
          retention-days: 7

  engine-smoke-macos:
    name: Bundled engine-host smoke (macOS arm64)
    # Serialized behind the macOS canary (CX-9): reuses the payload-download +
    # native-prefix cache that job just saved (same key, no duplicate cold native
    # assembly), and keeps at most one heavy macOS job on the runner pool at a time.
    needs: canary-macos
    # Schedule/dispatch only. The workflow still receives PR events, so a job-level
    # condition — not the trigger list — is what keeps this off pull requests. A
    # `run-engine-smoke` label could be added later if per-PR demand appears.
    if: github.event_name != 'pull_request'
    runs-on: macos-15
    timeout-minutes: 90

    env:
      PAYLOAD_PLATFORM: macos-arm64
      MACOSX_DEPLOYMENT_TARGET: "14.0"

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Assert Apple Silicon runner
        run: test "$(uname -m)" = "arm64"

      - name: Install native build prerequisites
        run: |
          brew install autoconf automake libtool
          for tool in cmake make clang pkg-config autoreconf; do
            command -v "$tool" >/dev/null 2>&1 || { echo "missing required build tool: $tool" >&2; exit 1; }
          done

      - name: Enable pnpm from packageManager
        run: corepack enable

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache Rust build output
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: . -> target

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: 25

      - name: Restore payload downloads and native prefixes
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          # Same key + paths as canary-macos so this job restores that job's saved
          # downloads/native prefixes. engine/upstream + engine/dist are not cached,
          # so Gradle/Stirling still rebuild here (~6–7 min) — recorded, revisit
          # with timing data.
          path: |
            installer/.payload-cache/macos-arm64/downloads
            installer/.payload-cache/macos-arm64/prefix
          key: payload-macos-arm64-${{ hashFiles('installer/PINS.macos-arm64.env', 'installer/ocrmypdf-macos-requirements.txt', 'engine/PINNED_TAG', 'installer/assemble-macos-arm64.sh') }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Start with prepare (NOT build:mcp-runtime): the assembler deletes and
      # rebuilds the MCP runtime itself, so a preceding build would be discarded.
      - name: Prepare shell bundle (payload + external bins)
        run: pnpm prepare:shell-bundle:macos-arm64

      # Tauri invokes only the UI build; help content is resolved from a generated
      # (tracked) dist/, so a stale copy could ship — rebuild it before packaging.
      - name: Build help content
        run: pnpm --filter @raiopdf/help-content build

      # Prune BEFORE the Tauri build: bundling makes a second copy of the payload
      # (peak disk), and neither of these is read after assembly. The source staging
      # payload is pruned AFTER the build, below.
      - name: Prune native build trees before packaging
        run: |
          df -h /
          rm -rf installer/.payload-cache/macos-arm64/work engine/upstream
          df -h /

      # Ad-hoc CI signature (APPLE_SIGNING_IDENTITY: "-") + hardened runtime from
      # the app-only signing config. tauri.macos.conf.json auto-loads on macOS; the
      # signing conf is the overlay that flips targets to app-only and turns updater
      # artifacts off. Structurally valid CI signature, not a notarizable one.
      - name: Build packaged macOS app (ad-hoc signed)
        env:
          APPLE_SIGNING_IDENTITY: "-"
        run: pnpm --filter @raiopdf/shell tauri build --config src-tauri/tauri.macos.signing.conf.json

      # --- Integrity gates: between the build and the functional smoke. ---

      - name: Verify bundled payload manifest
        # Point the assembler's verify path at the payload INSIDE the .app via the
        # supported RAIOPDF_PAYLOAD_DIR override (there is no alternate-root flag),
        # so this checks the manifest that actually shipped, not the staging copy.
        env:
          RAIOPDF_PAYLOAD_DIR: target/release/bundle/macos/RaioPDF.app/Contents/Resources/payload
        run: node installer/run-payload-assembler.mjs --platform macos-arm64 --verify

      - name: Validate package boundary
        run: node scripts/validate-package-boundary.mjs --platform macos-arm64 --root target/release/bundle/macos/RaioPDF.app/Contents

      - name: Verify code signature
        run: codesign --verify --deep --strict --verbose=2 target/release/bundle/macos/RaioPDF.app

      - name: Assert bundled engine-host is arm64
        run: |
          host="target/release/bundle/macos/RaioPDF.app/Contents/MacOS/raiopdf-engine-host"
          archs=$(lipo -archs "$host")
          echo "engine-host archs: $archs"
          case " $archs " in
            *" arm64 "*) ;;
            *) echo "bundled engine-host is not arm64: $archs" >&2; exit 1 ;;
          esac

      # Prune the source staging payload now that the integrity gates have run
      # against the bundle's own copy — frees the staging duplicate before smoke.
      - name: Prune source payload staging after bundling
        run: rm -rf apps/shell/src-tauri/payload/macos-arm64

      # Boots the bundle's own engine-host with RAIOPDF_ENGINE_* stripped and
      # launchd's PATH, then hits the loopback health/OCR/PDF-A endpoints — the
      # packaged payload-discovery + toolchain-resolution gap a green canary can't
      # see. It does NOT launch the Tauri app/WKWebView/native dialogs.
      - name: Bundled engine-host smoke
        env:
          RAIOPDF_APP_DATA_DIR: ${{ runner.temp }}/raiopdf-appdata
        run: node scripts/smoke-packaged-app.mjs

      - name: Upload engine-host smoke logs
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-smoke-logs-macos-arm64
          path: ${{ runner.temp }}/raiopdf-appdata
          if-no-files-found: ignore
          retention-days: 7
