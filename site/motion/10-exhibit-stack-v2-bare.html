<!doctype html>
<!-- exhibit-stack-v2 (bare) — chrome-stripped primitive for direct landing-page embedding.
     Core element only: the three document tiles flying in, stacking, and each taking a
     rubber-stamp "EXHIBIT A/B/C" hit on landing. Dropped the app-window titlebar (traffic-
     light dots), the bookmark side-rail, and the protruding index tabs — all read as extra
     chrome once this sits inside the page's own card, and the bookmark rail in particular
     reads as a second nested window. Scaled the stack up (~1.3x) since its native 148px
     footprint is smaller than the other primitives' core elements — this keeps the visual
     weight consistent across the grid. Transparent background, uniform 360x300 canvas. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · exhibit-stack (bare)</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --gold:#F5B942;
  --gold-deep:#E0932E;
  --text-muted:#5A6F8A;
  --ease-out:cubic-bezier(.16,1,.3,1);
  --border:#D4DFEE;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  min-height:100%;display:grid;place-items:center;
  background:transparent;
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
.frame{position:relative;width:360px;height:300px;display:grid;place-items:center;overflow:visible}

.stack{position:relative;width:148px;aspect-ratio:8.5/11;transform:scale(1.3)}
.tile{
  position:absolute;inset:0;background:#fff;border:1px solid var(--border);border-radius:6px;
  box-shadow:0 16px 34px -14px rgba(11,26,46,.4);padding:13px 12px;opacity:0;
}
.tile h5{margin:0 0 8px;font-size:7.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--text-muted);font-weight:700}
.ln{height:4px;border-radius:2px;background:#e3e9f1;margin:5px 0}
.ln.s{width:58%}.ln.m{width:86%}.ln.l{width:100%}

.stamp-ring{
  position:absolute;left:50%;top:63%;width:64px;height:64px;border-radius:50%;z-index:4;
  background:radial-gradient(circle,rgba(245,185,66,.62),transparent 68%);pointer-events:none;opacity:0;
}
.doc-stamp{
  position:absolute;left:50%;top:63%;width:104px;z-index:6;pointer-events:none;
  display:flex;flex-direction:column;align-items:center;gap:0;
  padding:5px 4px 6px;border:2.5px solid var(--gold-deep);border-radius:7px;
  background:rgba(255,255,255,.62);box-shadow:0 10px 22px -10px rgba(224,147,46,.55);
  opacity:0;
}
.doc-stamp .ds-top{font-size:7px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--gold-deep)}
.doc-stamp .ds-letter{font-size:22px;font-weight:800;line-height:1;color:var(--gold-deep);margin-top:1px}

@keyframes flyA{
  0%,3%{opacity:0;transform:translate(230px,-172px) rotate(20deg) scale(.8)}
  9%{opacity:1;transform:translate(-6px,-4px) rotate(-6deg) scale(1.04)}
  12%,13.7%{opacity:1;transform:translate(0,0) rotate(-2deg) scale(1)}
  14.3%{transform:translate(0,1.4px) rotate(-2.6deg) scale(.985)}
  15.6%{transform:translate(0,-.4px) rotate(-1.6deg) scale(1.01)}
  17%,88%{opacity:1;transform:translate(0,0) rotate(-2deg) scale(1)}
  96%,100%{opacity:0;transform:translate(0,0) rotate(-2deg) scale(1)}
}
@keyframes flyB{
  0%,25%{opacity:0;transform:translate(230px,-172px) rotate(20deg) scale(.8)}
  31%{opacity:1;transform:translate(3px,3px) rotate(5deg) scale(1.04)}
  34%,35.7%{opacity:1;transform:translate(6px,6px) rotate(2deg) scale(1)}
  36.3%{transform:translate(6px,7.4px) rotate(1.4deg) scale(.985)}
  37.6%{transform:translate(6px,5.6px) rotate(2.6deg) scale(1.01)}
  39%,88%{opacity:1;transform:translate(6px,6px) rotate(2deg) scale(1)}
  96%,100%{opacity:0;transform:translate(6px,6px) rotate(2deg) scale(1)}
}
@keyframes flyC{
  0%,47%{opacity:0;transform:translate(230px,-172px) rotate(20deg) scale(.8)}
  53%{opacity:1;transform:translate(9px,9px) rotate(-4deg) scale(1.04)}
  56%,57.7%{opacity:1;transform:translate(12px,12px) rotate(-1deg) scale(1)}
  58.3%{transform:translate(12px,13.4px) rotate(-1.6deg) scale(.985)}
  59.6%{transform:translate(12px,11.6px) rotate(-.4deg) scale(1.01)}
  61%,88%{opacity:1;transform:translate(12px,12px) rotate(-1deg) scale(1)}
  96%,100%{opacity:0;transform:translate(12px,12px) rotate(-1deg) scale(1)}
}
.tile-a{animation:flyA 10s var(--ease-out) infinite;z-index:1}
.tile-b{animation:flyB 10s var(--ease-out) infinite;z-index:2}
.tile-c{animation:flyC 10s var(--ease-out) infinite;z-index:3}

@keyframes stampA{
  0%,12.5%{opacity:0;transform:translate(-50%,-50%) scale(2.3) rotate(-22deg)}
  14%{opacity:1;transform:translate(-50%,-50%) scale(.8) rotate(-4deg)}
  15.6%{transform:translate(-50%,-50%) scale(1.08) rotate(-9deg)}
  17%,88%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-7deg)}
  96%,100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(-7deg)}
}
@keyframes ringA{
  0%,12.8%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  14%{opacity:.85;transform:translate(-50%,-50%) scale(.7)}
  18%,100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}
}
@keyframes stampB{
  0%,34.5%{opacity:0;transform:translate(-50%,-50%) scale(2.3) rotate(17deg)}
  36%{opacity:1;transform:translate(-50%,-50%) scale(.8) rotate(3deg)}
  37.6%{transform:translate(-50%,-50%) scale(1.08) rotate(8deg)}
  39%,88%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(6deg)}
  96%,100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(6deg)}
}
@keyframes ringB{
  0%,34.8%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  36%{opacity:.85;transform:translate(-50%,-50%) scale(.7)}
  40%,100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}
}
@keyframes stampC{
  0%,56.5%{opacity:0;transform:translate(-50%,-50%) scale(2.3) rotate(-15deg)}
  58%{opacity:1;transform:translate(-50%,-50%) scale(.8) rotate(-2deg)}
  59.6%{transform:translate(-50%,-50%) scale(1.08) rotate(-6deg)}
  61%,88%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-5deg)}
  96%,100%{opacity:0;transform:translate(-50%,-50%) scale(1) rotate(-5deg)}
}
@keyframes ringC{
  0%,56.8%{opacity:0;transform:translate(-50%,-50%) scale(.3)}
  58%{opacity:.85;transform:translate(-50%,-50%) scale(.7)}
  62%,100%{opacity:0;transform:translate(-50%,-50%) scale(1.7)}
}
.ds-a{animation:stampA 10s var(--ease-out) infinite}
.ds-b{animation:stampB 10s var(--ease-out) infinite}
.ds-c{animation:stampC 10s var(--ease-out) infinite}
.ring-a{animation:ringA 10s var(--ease-out) infinite}
.ring-b{animation:ringB 10s var(--ease-out) infinite}
.ring-c{animation:ringC 10s var(--ease-out) infinite}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .tile-a,.tile-b,.tile-c,.ds-a,.ds-b,.ds-c{opacity:1!important}
  .tile-a{transform:translate(0,0) rotate(-2deg)!important}
  .tile-b{transform:translate(6px,6px) rotate(2deg)!important}
  .tile-c{transform:translate(12px,12px) rotate(-1deg)!important}
  .ds-a{transform:translate(-50%,-50%) rotate(-7deg)!important}
  .ds-b{transform:translate(-50%,-50%) rotate(6deg)!important}
  .ds-c{transform:translate(-50%,-50%) rotate(-5deg)!important}
  .ring-a,.ring-b,.ring-c{display:none!important}
}
</style></head>
<body>
  <div class="frame" role="img" aria-label="Three document tiles assembling into an ordered exhibit binder, each stamped EXHIBIT A, B, then C directly on the page">
    <div class="stack">
      <div class="tile tile-a">
        <h5>Declaration</h5>
        <div class="ln l"></div><div class="ln m"></div><div class="ln s"></div><div class="ln l"></div>
        <span class="stamp-ring ring-a"></span>
        <div class="doc-stamp ds-a"><span class="ds-top">Exhibit</span><span class="ds-letter">A</span></div>
      </div>
      <div class="tile tile-b">
        <h5>Invoice</h5>
        <div class="ln m"></div><div class="ln l"></div><div class="ln s"></div>
        <span class="stamp-ring ring-b"></span>
        <div class="doc-stamp ds-b"><span class="ds-top">Exhibit</span><span class="ds-letter">B</span></div>
      </div>
      <div class="tile tile-c">
        <h5>Correspondence</h5>
        <div class="ln l"></div><div class="ln s"></div><div class="ln m"></div><div class="ln l"></div>
        <span class="stamp-ring ring-c"></span>
        <div class="doc-stamp ds-c"><span class="ds-top">Exhibit</span><span class="ds-letter">C</span></div>
      </div>
    </div>
  </div>
</body></html>
