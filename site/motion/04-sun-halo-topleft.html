<!doctype html>
<!-- sun-halo-topleft — iteration of 04-sun-halo.html: identical rotating-rays + pulsing-halo-rings +
     breathing-glow treatment, but mirrored to anchor at the TOP-LEFT corner instead of top-right.
     The sun mark sits at/just past the top-left corner so the visible rays fan outward down-and-
     right into the page (the off-canvas portion is simply clipped by the corner). Meant to sit at
     the very top-left of a landing hero, layered BEHIND hero copy on a navy dawn background;
     pointer-events pass through so it never intercepts clicks. Ambient and subtle. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · sun-halo (top-left)</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --navy:#132D52;
  --primary:#1D4E8F;
  --accent:#4AADE0;
  --surface:#F7FAFE;
  --bg-alt:#EDF4FB;
  --text-primary:#0B1A2E;
  --text-body:#2D3E56;
  --text-muted:#5A6F8A;
  --gold:#F5B942;
  --gold-deep:#E0932E;
  --gold-pale:#FFE7B3;
  /* sun-mark variable aliases (the SVG uses these names) */
  --identity-amber:var(--gold-deep);
  --identity-amber-bright:var(--gold);
  --primary-deep:var(--navy-deep);
  --radius-window:12px;
  --shadow-page:0 24px 60px -18px rgba(11,26,46,.55);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-inout:cubic-bezier(.65,0,.35,1);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  overflow:hidden;
  background:radial-gradient(130% 100% at 22% 18%, #1a3760 0%, var(--navy-deep) 52%, #060f1b 100%);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.stage{position:fixed;inset:0;pointer-events:none;overflow:hidden}

/* the wide ambient wash — the part meant to bleed across the hero behind copy */
.ambient-wash{
  position:absolute;top:-24%;left:-20%;width:112vmin;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle, rgba(245,185,66,.24), rgba(245,185,66,.06) 42%, transparent 68%);
  filter:blur(30px);
  animation:washBreathe 10s ease-in-out infinite;
}
@keyframes washBreathe{
  0%,100%{opacity:.7;transform:scale(1)}
  50%{opacity:1;transform:scale(1.05)}
}

/* the tighter cluster: halo rings + core glow + the mark itself */
.cluster{
  position:absolute;top:-18%;left:-14%;width:74vmin;aspect-ratio:1;
  display:grid;place-items:center;
}

.halo{
  position:absolute;inset:0;margin:auto;width:46%;aspect-ratio:1;border-radius:50%;
  border:1.5px solid var(--gold);opacity:0;
  animation:halo 5.4s var(--ease-out) infinite;
}
.halo:nth-child(2){animation-delay:1.35s}
.halo:nth-child(3){animation-delay:2.7s}
.halo:nth-child(4){animation-delay:4.05s}
@keyframes halo{
  0%{transform:scale(.9);opacity:.5}
  70%{opacity:.05}
  100%{transform:scale(2.3);opacity:0}
}

.glow{
  position:absolute;inset:0;margin:auto;width:70%;aspect-ratio:1;border-radius:50%;
  background:radial-gradient(circle, rgba(245,185,66,.45), rgba(245,185,66,.10) 45%, transparent 68%);
  filter:blur(6px);
  animation:breathe 6.4s ease-in-out infinite;
}
@keyframes breathe{
  0%,100%{transform:scale(.94);opacity:.75}
  50%{transform:scale(1.07);opacity:1}
}

.raio-sun{position:relative;width:80%;height:80%;filter:drop-shadow(0 8px 26px rgba(224,147,46,.5));}
.raio-sun #rays{transform-origin:100px 100px;animation:spin 30s linear infinite}
.raio-sun #sun-ring circle{stroke:#dfe9f6}
@keyframes spin{to{transform:rotate(360deg)}}

@media (prefers-reduced-motion:reduce){
  .ambient-wash,.halo,.glow,.raio-sun #rays{animation:none!important;}
  .halo{opacity:.22;transform:scale(1.3)}
}
</style></head>
<body>
  <div class="stage" aria-hidden="true">
    <div class="ambient-wash"></div>
    <div class="cluster">
      <span class="halo"></span><span class="halo"></span><span class="halo"></span><span class="halo"></span>
      <span class="glow"></span>
      <svg class="raio-sun" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

          <path d="M127.33,131.89 L159.86,169.86 L162.36,167.64 L128.47,130.88 Z" fill="var(--identity-amber)"/>
          <path d="M133.58,125.22 L173.56,155.25 L177.22,150.01 L135.25,122.83 Z" fill="var(--identity-amber-bright)"/>
          <path d="M138.51,116.77 L184.35,136.73 L187.30,129.02 L139.86,113.25 Z" fill="var(--identity-amber)"/>
          <path d="M141.49,106.53 L190.88,114.30 L191.59,108.64 L141.81,103.94 Z" fill="var(--identity-amber-bright)"/>
        </g>
        <g id="sun-ring"><circle cx="100" cy="100" r="42" fill="none" stroke-width="5"/></g>
      </svg>
    </div>
  </div>
</body></html>
