<!doctype html>
<!-- redaction-card (bare) — chrome-stripped primitive for direct landing-page embedding.
     Core element only: the document with the sensitive line getting redacted, plus the
     on-document "removed & verified" confirmation chip. No card shell, header, or footer —
     the page provides its own card frame + caption. Transparent background, uniform
     360x300 canvas so it sits flush in a grid alongside the other bare primitives. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · true redaction (bare)</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --accent:#4AADE0;
  --text-body:#2D3E56;
  --ease-out:cubic-bezier(.16,1,.3,1);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  min-height:100%;display:grid;place-items:center;
  background:transparent;
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
.frame{position:relative;width:360px;height:300px;display:grid;place-items:center}
.stage{position:relative;width:320px;height:200px;display:grid;place-items:center}

.page{width:220px;background:#fff;border-radius:4px;box-shadow:0 16px 34px -16px rgba(11,26,46,.4);padding:16px 15px;position:relative}
.page h4{margin:0 0 9px;font-size:8.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--navy-deep);font-weight:700}
.ln{height:5px;border-radius:3px;background:#dfe6f0;margin:7px 0}
.ln.s{width:60%}.ln.m{width:90%}.ln.l{width:100%}
.target{position:relative;height:14px;margin:9px 0 11px;display:flex;align-items:center}
.target .fake{font:600 8.5px ui-monospace,monospace;color:var(--text-body);white-space:nowrap;letter-spacing:.2px}
.marquee{position:absolute;left:0;top:-2px;bottom:-2px;width:0;border-radius:3px;
  border:1.4px dashed var(--accent);background:rgba(74,173,224,.14);
  animation:marqueeGrow 9.6s var(--ease-out) infinite}
.bar{position:absolute;left:0;right:0;top:-2px;bottom:-2px;border-radius:3px;background:var(--navy-deep);
  transform:translateY(-16px) scaleY(.4);opacity:0;transform-origin:center;
  animation:barSlam 9.6s var(--ease-out) infinite}
.scanline{position:absolute;top:-2px;bottom:-2px;width:16px;left:-10%;opacity:0;border-radius:3px;
  background:linear-gradient(90deg,transparent,rgba(245,185,66,.9),transparent);
  animation:scanSweep 9.6s linear infinite}

.chip{position:absolute;right:10px;top:58px;display:inline-flex;align-items:center;gap:4px;
  font-size:9.5px;font-weight:700;color:#166534;background:#DCFCE7;border-radius:20px;
  padding:3px 8px;box-shadow:0 4px 10px -4px rgba(22,101,52,.35);
  opacity:0;transform:scale(.85);z-index:2;
  animation:chipPop 9.6s var(--ease-out) infinite}

@keyframes marqueeGrow{
  0%,14%{width:0;opacity:0}
  17%{opacity:1}
  27%{width:100%;opacity:1}
  30%,100%{width:100%;opacity:0}
}
@keyframes barSlam{
  0%,27%{transform:translateY(-16px) scaleY(.4);opacity:0}
  31%{transform:translateY(-16px) scaleY(.4);opacity:0}
  35%{transform:translateY(2px) scaleY(1.12);opacity:1}
  39%{transform:translateY(0) scaleY(1);opacity:1}
  86%{transform:translateY(0) scaleY(1);opacity:1}
  92%{transform:translateY(-6px) scaleY(.7);opacity:0}
  100%{transform:translateY(-16px) scaleY(.4);opacity:0}
}
@keyframes scanSweep{
  0%,40%{left:-10%;opacity:0}
  42%{opacity:1}
  49%{left:96%;opacity:1}
  51%,100%{left:110%;opacity:0}
}
@keyframes chipPop{
  0%,45%{opacity:0;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.06)}
  54%{transform:scale(1)}
  86%{opacity:1;transform:scale(1)}
  92%{opacity:0;transform:scale(.9)}
  100%{opacity:0;transform:scale(.85)}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .marquee{opacity:0;width:0}
  .bar{opacity:1;transform:none}
  .scanline{opacity:0}
  .chip{opacity:1;transform:none}
}
</style></head>
<body>
  <div class="frame">
    <div class="stage">
      <div class="page">
        <h4>Witness Statement · Exhibit 4</h4>
        <div class="ln l"></div><div class="ln m"></div>
        <div class="target">
          <span class="fake">SSN 123-45-6789 · J. A. Doe</span>
          <span class="marquee"></span>
          <span class="bar"></span>
          <span class="scanline"></span>
        </div>
        <div class="ln l"></div><div class="ln s"></div><div class="ln m"></div>
      </div>
      <span class="chip">✓ removed &amp; verified</span>
    </div>
  </div>
</body></html>
