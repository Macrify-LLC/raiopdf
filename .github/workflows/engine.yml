name: Engine

on:
  pull_request:
    paths:
      - engine/**
      - docs/ENGINE-VENDORING.md
  schedule:
    - cron: "0 8 * * 1"

# Engine verification reads public source only; no token write scope or secrets.
permissions:
  contents: read

# Cancel stale runs for the same PR/ref while keeping the weekly run isolated.
concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Java
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Vendor engine
        run: engine/vendor.sh

      - name: Build Linux engine
        run: PLATFORM=linux-x64 engine/build.sh

      - name: Verify engine live
        run: PLATFORM=linux-x64 engine/verify-live.sh
