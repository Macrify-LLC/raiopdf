<!doctype html>
<!-- bates-counter — feature card: an odometer-style counter rolls RAIO_000001 → RAIO_000500
     while a small fanned stack of pages behind it each pick up a corner stamp as the count climbs,
     then resets cleanly. Pure-CSS stepped digit wheels (no JS). Loops.
     Placement: marketing feature grid — one drop-in card among several (~360-420px wide).
     Background: transparent card; shown here on a light bg-alt demo canvas. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · Bates numbering</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --navy:#132D52;
  --primary:#1D4E8F;
  --accent:#4AADE0;
  --surface:#F7FAFE;
  --bg-alt:#EDF4FB;
  --text-primary:#0B1A2E;
  --text-body:#2D3E56;
  --text-muted:#5A6F8A;
  --gold:#F5B942;
  --gold-deep:#E0932E;
  --gold-pale:#FFE7B3;
  --identity-amber:var(--gold-deep);
  --identity-amber-bright:var(--gold);
  --primary-deep:var(--navy-deep);
  --radius-window:12px;
  --shadow-page:0 24px 60px -18px rgba(11,26,46,.55);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-inout:cubic-bezier(.65,0,.35,1);
  --border:#D4DFEE;
  --well:#E7EEF7;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  min-height:100%;display:grid;place-items:center;padding:32px;
  background:var(--bg-alt);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
.card{
  width:100%;max-width:400px;min-width:320px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-window);
  box-shadow:0 30px 60px -30px rgba(11,26,46,.35),0 2px 10px rgba(11,26,46,.06);
  overflow:hidden;
}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--navy),var(--primary),var(--accent))}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 18px 10px}
.card-head .icon{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 6px 14px -6px rgba(224,147,46,.6)}
.card-head .icon svg{width:16px;height:16px}
.card-head .t b{display:block;font-size:14.5px;color:var(--text-primary);letter-spacing:-.1px}
.card-head .t span{display:block;font-size:11px;color:var(--text-muted);margin-top:1px}

.stage{position:relative;margin:2px 18px 0;height:200px;background:var(--well);border:1px solid var(--border);
  border-radius:var(--radius-window);display:flex;align-items:center;justify-content:center;gap:22px;overflow:hidden}

/* fanned page stack, each with a corner stamp that lands as the count climbs */
.stack{position:relative;width:96px;height:120px;flex:none}
.pg{position:absolute;width:78px;height:100px;background:#fff;border:1px solid var(--border);border-radius:3px;
  box-shadow:0 10px 22px -10px rgba(11,26,46,.35)}
.pg:nth-child(1){top:16px;left:0;transform:rotate(-7deg)}
.pg:nth-child(2){top:9px;left:8px;transform:rotate(-2deg)}
.pg:nth-child(3){top:3px;left:16px;transform:rotate(3deg)}
.pg:nth-child(4){top:0;left:24px;transform:rotate(7deg);z-index:2}
.pg .stamp{position:absolute;right:4px;bottom:4px;font:700 5.5px ui-monospace,monospace;color:var(--gold-deep);
  background:#fff;border:1px solid var(--gold);border-radius:3px;padding:1.5px 3px;opacity:0;transform:scale(.5);
  animation:stampPulse 9.6s var(--ease-out) infinite}
.pg:nth-child(1) .stamp{animation-delay:0s}
.pg:nth-child(2) .stamp{animation-delay:1.9s}
.pg:nth-child(3) .stamp{animation-delay:3.6s}
.pg:nth-child(4) .stamp{animation-delay:5.4s}
@keyframes stampPulse{
  0%{opacity:0;transform:scale(.5)}
  4%{opacity:1;transform:scale(1.15)}
  8%{transform:scale(1)}
  90%{opacity:1;transform:scale(1)}
  96%{opacity:0;transform:scale(.6)}
  100%{opacity:0;transform:scale(.5)}
}

/* odometer */
.odo{position:relative;background:#fff;border:1px solid var(--border);border-radius:10px;
  box-shadow:0 14px 30px -14px rgba(11,26,46,.35);padding:14px 14px;z-index:3;flex:none}
.odo .row{display:flex;align-items:center;font:700 19px ui-monospace,monospace;color:var(--navy-deep);letter-spacing:.5px;white-space:nowrap}
.odo .prefix{color:var(--text-muted);margin-right:1px}
.odo .zeros{color:var(--navy-deep)}
.wheel{width:13px;height:25px;overflow:hidden;position:relative;display:inline-block;vertical-align:top}
.wheel .strip{position:absolute;left:0;top:0;width:100%}
.wheel .strip span{display:block;height:25px;line-height:25px;text-align:center}
.wheel-h .strip{animation:hundredsRoll 9.6s var(--ease-out) infinite}
.wheel-t .strip{animation:tensRoll 9.6s linear infinite}
.wheel-o .strip{animation:onesRoll 9.6s linear infinite}
@keyframes hundredsRoll{
  0%{transform:translateY(0);animation-timing-function:steps(5,end)}
  80%{transform:translateY(-125px);animation-timing-function:steps(1,end)}
  92%{transform:translateY(-125px);animation-timing-function:steps(1,end)}
  100%{transform:translateY(0)}
}
@keyframes tensRoll{
  0%{transform:translateY(0)}
  80%{transform:translateY(-250px);animation-timing-function:steps(1,end)}
  92%{transform:translateY(-250px);animation-timing-function:steps(1,end)}
  100%{transform:translateY(0)}
}
@keyframes onesRoll{
  0%{transform:translateY(0)}
  80%{transform:translateY(-500px);animation-timing-function:steps(1,end)}
  92%{transform:translateY(-500px);animation-timing-function:steps(1,end)}
  100%{transform:translateY(0)}
}

.status{display:flex;align-items:center;gap:7px;padding:10px 18px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text-muted)}
.status .live{width:6px;height:6px;border-radius:50%;background:#63c86b;flex:none;animation:ping 2s infinite}
.status b{color:var(--navy-deep)}
.status .right{margin-left:auto;font-weight:700;color:var(--gold-deep)}
@keyframes ping{0%{box-shadow:0 0 0 0 rgba(99,200,107,.5)}70%{box-shadow:0 0 0 6px rgba(99,200,107,0)}100%{box-shadow:0 0 0 0 rgba(99,200,107,0)}}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .wheel-h .strip{transform:translateY(-125px)}
  .wheel-t .strip{transform:translateY(0)}
  .wheel-o .strip{transform:translateY(0)}
  .pg .stamp{opacity:1;transform:none}
}
</style></head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="card-head">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M5 9h14M5 15h14M10 4 8 20M16 4l-2 16"/>
      </svg></span>
      <span class="t"><b>Bates Numbering</b><span>One click, whole set</span></span>
    </div>
    <div class="stage">
      <div class="stack">
        <div class="pg"><span class="stamp">RAIO</span></div>
        <div class="pg"><span class="stamp">RAIO</span></div>
        <div class="pg"><span class="stamp">RAIO</span></div>
        <div class="pg"><span class="stamp">RAIO</span></div>
      </div>
      <div class="odo">
        <div class="row">
          <span class="prefix">RAIO_</span><span class="zeros">000</span><span
          class="wheel wheel-h"><span class="strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span></span></span><span
          class="wheel wheel-t"><span class="strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span></span></span><span
          class="wheel wheel-o"><span class="strip"><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span><span>1</span><span>2</span><span>3</span><span>4</span><span>5</span><span>6</span><span>7</span><span>8</span><span>9</span><span>0</span></span></span>
        </div>
      </div>
    </div>
    <div class="status"><span class="live"></span><span><b>Whole document set</b> · one pass</span><span class="right">No manual retyping</span></div>
  </div>
</body></html>
