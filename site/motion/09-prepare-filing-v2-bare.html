<!doctype html>
<!-- prepare-filing-v2 (bare) — chrome-stripped primitive for direct landing-page embedding.
     Core element only: the page normalizing to letter-size, then splitting into three
     labeled, fanned parts. Dropped the floating "Letter-size · portal-ready" preflight
     pill (redundant caption text) — the on-page "normalized" badge and each part's label
     stay, since they're part of the artifact itself, not surrounding chrome. No card
     shell, header, or footer. Transparent background, uniform 360x300 canvas to match
     the other bare primitives. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · prepare for filing (bare)</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --ease-out:cubic-bezier(.16,1,.3,1);
  --border:#D4DFEE;
  --bg-alt:#EDF4FB;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  min-height:100%;display:grid;place-items:center;
  background:transparent;
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
.frame{position:relative;width:360px;height:300px;display:grid;place-items:center}
.stage{position:relative;width:320px;height:220px}

.center{position:absolute;left:50%;top:56%;transform:translate(-50%,-50%)}

.mainpage{position:relative;background:#fff;border-radius:4px;box-shadow:0 16px 34px -16px rgba(11,26,46,.4);
  padding:10px 12px;opacity:0;animation:mainpageResize 9.6s var(--ease-out) infinite}
.mainpage .ln{height:4px;border-radius:3px;background:#dfe6f0;margin:6px 0}
.mainpage .ln.l{width:100%}.mainpage .ln.m{width:78%}.mainpage .ln.s{width:56%}
.mainpage .badge{position:absolute;left:50%;bottom:-11px;transform:translateX(-50%);white-space:nowrap;
  font:700 7px ui-monospace,monospace;color:#166534;background:#DCFCE7;border-radius:20px;padding:2px 6px;
  opacity:0;animation:normBadge 9.6s var(--ease-out) infinite}

.part{position:absolute;left:50%;top:54%;width:78px;height:92px;margin:-46px 0 0 -39px;
  background:#fff;border:1px solid var(--border);border-radius:4px;
  box-shadow:0 12px 26px -12px rgba(11,26,46,.4);opacity:0;z-index:1;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding-bottom:6px}
.part .ln{width:66%;height:4px;border-radius:3px;background:#dfe6f0;margin:3px 0}
.part b{font:700 6.5px/1.3 ui-monospace,monospace;color:var(--navy-deep);background:var(--bg-alt);
  border:1px solid var(--border);border-radius:8px;padding:3px 4px;white-space:normal;text-align:center;
  max-width:70px;margin-top:4px}
.part.p1{animation:partShow1 9.6s var(--ease-out) infinite}
.part.p2{animation:partShow2 9.6s var(--ease-out) infinite;z-index:2}
.part.p3{animation:partShow3 9.6s var(--ease-out) infinite}

@keyframes mainpageResize{
  0%{opacity:0;width:200px;height:126px}
  4%{opacity:1;width:200px;height:126px;animation-timing-function:linear}
  26%{opacity:1;width:200px;height:126px;animation-timing-function:cubic-bezier(.34,1.56,.64,1)}
  40%{opacity:1;width:126px;height:162px;animation-timing-function:linear}
  64%{opacity:1;width:126px;height:162px;animation-timing-function:var(--ease-out)}
  74%,100%{opacity:0;width:126px;height:162px}
}
@keyframes normBadge{
  0%,38%{opacity:0}
  42%{opacity:1}
  62%{opacity:1}
  68%,100%{opacity:0}
}
@keyframes partShow1{
  0%,40%{opacity:0;transform:translate(0,0) rotate(0) scale(.85)}
  46%{opacity:1;transform:translate(-72px,0) rotate(-9deg) scale(1)}
  74%{opacity:1;transform:translate(-72px,0) rotate(-9deg) scale(1)}
  80%,100%{opacity:0;transform:translate(-78px,0) rotate(-11deg) scale(.9)}
}
@keyframes partShow2{
  0%,44%{opacity:0;transform:translate(0,0) rotate(0) scale(.85)}
  50%{opacity:1;transform:translate(0,-4px) rotate(0) scale(1.05)}
  74%{opacity:1;transform:translate(0,-4px) rotate(0) scale(1.05)}
  82%,100%{opacity:0;transform:translate(0,0) rotate(0) scale(.9)}
}
@keyframes partShow3{
  0%,48%{opacity:0;transform:translate(0,0) rotate(0) scale(.85)}
  54%{opacity:1;transform:translate(72px,0) rotate(9deg) scale(1)}
  74%{opacity:1;transform:translate(72px,0) rotate(9deg) scale(1)}
  84%,100%{opacity:0;transform:translate(78px,0) rotate(11deg) scale(.9)}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .mainpage{opacity:0}
  .part{opacity:1}
  .part.p1{transform:translate(-72px,0) rotate(-9deg) scale(1)}
  .part.p2{transform:translate(0,-4px) rotate(0) scale(1.05)}
  .part.p3{transform:translate(72px,0) rotate(9deg) scale(1)}
}
</style></head>
<body>
  <div class="frame">
    <div class="stage">
      <div class="center">
        <div class="mainpage">
          <div class="ln l"></div><div class="ln m"></div><div class="ln l"></div><div class="ln s"></div>
          <span class="badge">&#10003; normalized &middot; letter portrait</span>
        </div>
        <div class="part p1"><div class="ln"></div><div class="ln"></div><div class="ln"></div><b>Part 1 of 3 &middot; &le; portal limit</b></div>
        <div class="part p2"><div class="ln"></div><div class="ln"></div><div class="ln"></div><b>Part 2 of 3 &middot; &le; portal limit</b></div>
        <div class="part p3"><div class="ln"></div><div class="ln"></div><div class="ln"></div><b>Part 3 of 3 &middot; &le; portal limit</b></div>
      </div>
    </div>
  </div>
</body></html>
