<!doctype html>
<!-- redaction-card — feature card: a selection marquee draws over sensitive text, a navy-black
     redaction bar "slams" down over it, then a re-extraction check runs and a green
     "removed & verified" chip confirms the text is gone, not just covered. Loops.
     Placement: marketing feature grid — one drop-in card among several (~360-420px wide).
     Background: transparent card; shown here on a light bg-alt demo canvas. -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · true redaction</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --navy:#132D52;
  --primary:#1D4E8F;
  --accent:#4AADE0;
  --surface:#F7FAFE;
  --bg-alt:#EDF4FB;
  --text-primary:#0B1A2E;
  --text-body:#2D3E56;
  --text-muted:#5A6F8A;
  --gold:#F5B942;
  --gold-deep:#E0932E;
  --gold-pale:#FFE7B3;
  --identity-amber:var(--gold-deep);
  --identity-amber-bright:var(--gold);
  --primary-deep:var(--navy-deep);
  --radius-window:12px;
  --shadow-page:0 24px 60px -18px rgba(11,26,46,.55);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-inout:cubic-bezier(.65,0,.35,1);
  --border:#D4DFEE;
  --well:#E7EEF7;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  min-height:100%;display:grid;place-items:center;padding:32px;
  background:var(--bg-alt);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
.card{
  width:100%;max-width:400px;min-width:320px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-window);
  box-shadow:0 30px 60px -30px rgba(11,26,46,.35),0 2px 10px rgba(11,26,46,.06);
  overflow:hidden;
}
.accent-bar{height:3px;background:linear-gradient(90deg,var(--navy),var(--primary),var(--accent))}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 18px 10px}
.card-head .icon{width:30px;height:30px;border-radius:9px;flex:none;display:grid;place-items:center;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));box-shadow:0 6px 14px -6px rgba(224,147,46,.6)}
.card-head .icon svg{width:16px;height:16px}
.card-head .t b{display:block;font-size:14.5px;color:var(--text-primary);letter-spacing:-.1px}
.card-head .t span{display:block;font-size:11px;color:var(--text-muted);margin-top:1px}

.stage{position:relative;margin:2px 18px 0;height:200px;background:var(--well);border:1px solid var(--border);
  border-radius:var(--radius-window);display:grid;place-items:center;overflow:hidden}
.page{width:220px;background:#fff;border-radius:4px;box-shadow:0 16px 34px -16px rgba(11,26,46,.4);padding:16px 15px;position:relative}
.page h4{margin:0 0 9px;font-size:8.5px;letter-spacing:.4px;text-transform:uppercase;color:var(--navy-deep);font-weight:700}
.ln{height:5px;border-radius:3px;background:#dfe6f0;margin:7px 0}
.ln.s{width:60%}.ln.m{width:90%}.ln.l{width:100%}
.target{position:relative;height:14px;margin:9px 0 11px;display:flex;align-items:center}
.target .fake{font:600 8.5px ui-monospace,monospace;color:var(--text-body);white-space:nowrap;letter-spacing:.2px}
.marquee{position:absolute;left:0;top:-2px;bottom:-2px;width:0;border-radius:3px;
  border:1.4px dashed var(--accent);background:rgba(74,173,224,.14);
  animation:marqueeGrow 9.6s var(--ease-out) infinite}
.bar{position:absolute;left:0;right:0;top:-2px;bottom:-2px;border-radius:3px;background:var(--navy-deep);
  transform:translateY(-16px) scaleY(.4);opacity:0;transform-origin:center;
  animation:barSlam 9.6s var(--ease-out) infinite}
.scanline{position:absolute;top:-2px;bottom:-2px;width:16px;left:-10%;opacity:0;border-radius:3px;
  background:linear-gradient(90deg,transparent,rgba(245,185,66,.9),transparent);
  animation:scanSweep 9.6s linear infinite}

.chip{position:absolute;right:10px;top:58px;display:inline-flex;align-items:center;gap:4px;
  font-size:9.5px;font-weight:700;color:#166534;background:#DCFCE7;border-radius:20px;
  padding:3px 8px;box-shadow:0 4px 10px -4px rgba(22,101,52,.35);
  opacity:0;transform:scale(.85);z-index:2;
  animation:chipPop 9.6s var(--ease-out) infinite}

.caption{margin:10px 18px 4px;opacity:0;transform:translateY(4px);animation:capShow 9.6s var(--ease-out) infinite}
.caption .term{font:11px ui-monospace,monospace;color:var(--navy);background:var(--bg-alt);border:1px solid var(--border);
  border-radius:6px;padding:5px 8px;display:block}
.caption .term b{color:#166534}
.caption p{margin:6px 2px 0;font-size:11px;color:var(--text-muted);line-height:1.4}

.status{display:flex;align-items:center;gap:7px;padding:10px 18px;border-top:1px solid var(--border);font-size:10.5px;color:var(--text-muted)}
.status .live{width:6px;height:6px;border-radius:50%;background:#63c86b;flex:none;animation:ping 2s infinite}
.status .right{margin-left:auto;font-weight:700;color:var(--gold-deep)}

@keyframes ping{0%{box-shadow:0 0 0 0 rgba(99,200,107,.5)}70%{box-shadow:0 0 0 6px rgba(99,200,107,0)}100%{box-shadow:0 0 0 0 rgba(99,200,107,0)}}

@keyframes marqueeGrow{
  0%,14%{width:0;opacity:0}
  17%{opacity:1}
  27%{width:100%;opacity:1}
  30%,100%{width:100%;opacity:0}
}
@keyframes barSlam{
  0%,27%{transform:translateY(-16px) scaleY(.4);opacity:0}
  31%{transform:translateY(-16px) scaleY(.4);opacity:0}
  35%{transform:translateY(2px) scaleY(1.12);opacity:1}
  39%{transform:translateY(0) scaleY(1);opacity:1}
  86%{transform:translateY(0) scaleY(1);opacity:1}
  92%{transform:translateY(-6px) scaleY(.7);opacity:0}
  100%{transform:translateY(-16px) scaleY(.4);opacity:0}
}
@keyframes scanSweep{
  0%,40%{left:-10%;opacity:0}
  42%{opacity:1}
  49%{left:96%;opacity:1}
  51%,100%{left:110%;opacity:0}
}
@keyframes chipPop{
  0%,45%{opacity:0;transform:scale(.85)}
  50%{opacity:1;transform:scale(1.06)}
  54%{transform:scale(1)}
  86%{opacity:1;transform:scale(1)}
  92%{opacity:0;transform:scale(.9)}
  100%{opacity:0;transform:scale(.85)}
}
@keyframes capShow{
  0%,45%{opacity:0;transform:translateY(4px)}
  50%{opacity:1;transform:translateY(0)}
  86%{opacity:1;transform:translateY(0)}
  92%{opacity:0;transform:translateY(4px)}
  100%{opacity:0;transform:translateY(4px)}
}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .marquee{opacity:0;width:0}
  .bar{opacity:1;transform:none}
  .scanline{opacity:0}
  .chip{opacity:1;transform:none}
  .caption{opacity:1;transform:none}
}
</style></head>
<body>
  <div class="card">
    <div class="accent-bar"></div>
    <div class="card-head">
      <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="3" width="16" height="18" rx="2"/>
        <path d="M8 8h5"/>
        <rect x="7.5" y="11.5" width="9" height="3" rx="1" fill="#fff" stroke="none"/>
        <path d="M8 18h6"/>
      </svg></span>
      <span class="t"><b>True Redaction</b><span>Not a black-box overlay</span></span>
    </div>
    <div class="stage">
      <div class="page">
        <h4>Witness Statement · Exhibit 4</h4>
        <div class="ln l"></div><div class="ln m"></div>
        <div class="target">
          <span class="fake">SSN 123-45-6789 · J. A. Doe</span>
          <span class="marquee"></span>
          <span class="bar"></span>
          <span class="scanline"></span>
        </div>
        <div class="ln l"></div><div class="ln s"></div><div class="ln m"></div>
      </div>
      <span class="chip">✓ removed &amp; verified</span>
    </div>
    <div class="caption">
      <span class="term">re-extract --check → <b>0 matches</b></span>
      <p>content deleted, not just hidden — confirmed by re-extraction</p>
    </div>
    <div class="status"><span class="live"></span><span>Runs on this machine</span><span class="right">Verified, not hidden</span></div>
  </div>
</body></html>
