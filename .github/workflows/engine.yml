name: Engine

on:
  pull_request:
    paths:
      - engine/**
      - docs/ENGINE-VENDORING.md
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

# Engine verification reads public source only; no token write scope or secrets.
permissions:
  contents: read

# Cancel stale runs for the same PR/ref while keeping the weekly run isolated.
concurrency:
  group: engine-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: Engine
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Java 25 runtime
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 25

      - name: Set up Java 21 build launcher
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          distribution: temurin
          java-version: 21
          # no gradle cache: gradle files only exist inside engine/upstream after vendoring

      - name: Vendor engine
        run: engine/vendor.sh

      - name: Build Linux engine
        run: PLATFORM=linux-x64 engine/build.sh

      - name: Verify engine live
        run: |
          : "${JAVA_HOME_25_X64:?Java 25 runtime was not configured}"
          JAVA_BIN="$JAVA_HOME_25_X64/bin/java" PLATFORM=linux-x64 engine/verify-live.sh
