[package]
name = "raiopdf-shell"
version = "0.0.0"
description = "RaioPDF desktop shell"
authors = ["Macrify LLC"]
edition = "2021"
build = "build.rs"

[lib]
name = "raiopdf_shell_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "raiopdf-shell"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2.6.3", features = [] }

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tauri = { version = "2.11.5", features = [] }
tauri-plugin-dialog = "2.7.1"
uuid = { version = "1", features = ["v4"] }
getrandom = "0.3"

[patch.crates-io]
# Tauri currently resolves plist 1.9.0, which hard-pins quick-xml 0.39.x.
# Keep plist source stable while allowing the fixed quick-xml line required by RustSec.
plist = { path = "vendor/plist" }
