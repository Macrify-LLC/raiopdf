<!doctype html>
<!-- download-cta-v2 — iteration on 15-download-cta-pulse.html (original kept untouched).
     Same honest public-alpha status pill, sun-glow pulse, expanding rings, and amber shimmer
     sweep as v1 — but the primary button now carries an actual download glyph (Lucide
     "download": arrow into a tray) and reads "Download RaioPDF", so the CTA reads as
     the target install action rather than a repo-watch link. Platform-neutral by design —
     this scene isn't wired to the live release-data JS, so it never names a specific OS;
     it stays honest whether macOS has shipped yet or not. Placement: hero CTA / footer
     CTA. Background: navy dawn. Loops seamlessly (ambient, no reset). -->
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Raio · download-cta v2</title>
<style>
:root{
  --navy-deep:#0B1A2E;
  --navy:#132D52;
  --primary:#1D4E8F;
  --accent:#4AADE0;
  --surface:#F7FAFE;
  --bg-alt:#EDF4FB;
  --text-primary:#0B1A2E;
  --text-body:#2D3E56;
  --text-muted:#5A6F8A;
  --gold:#F5B942;
  --gold-deep:#E0932E;
  --gold-pale:#FFE7B3;
  --identity-amber:var(--gold-deep);
  --identity-amber-bright:var(--gold);
  --primary-deep:var(--navy-deep);
  --radius-window:12px;
  --shadow-page:0 24px 60px -18px rgba(11,26,46,.55);
  --ease-out:cubic-bezier(.16,1,.3,1);
  --ease-inout:cubic-bezier(.65,0,.35,1);
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  display:grid;place-items:center;overflow:hidden;
  background:radial-gradient(130% 100% at 50% 28%,#183561 0%,var(--navy-deep) 55%,#060f1b 100%);
  font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}

.stage{position:relative;display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px}

/* faint rotating sun tucked behind the whole CTA */
.sun-accent{position:absolute;top:-46px;right:-30px;width:140px;height:140px;opacity:.14;pointer-events:none}
.sun-accent #rays{transform-origin:100px 100px;animation:spin 40s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* honest status pill */
.pill{
  display:inline-flex;align-items:center;gap:9px;padding:7px 15px;border-radius:999px;
  background:rgba(245,185,66,.09);border:1px solid rgba(245,185,66,.32);
  font-size:12px;font-weight:600;color:var(--gold-pale);letter-spacing:.1px;
}
.pill .dot{position:relative;width:7px;height:7px;border-radius:50%;background:var(--gold);flex:0 0 auto}
.pill .dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1.4px solid var(--gold);
  animation:ping 2.4s ease-out infinite}
@keyframes ping{0%{transform:scale(.6);opacity:.75}100%{transform:scale(2.2);opacity:0}}

/* the button, with pulse rings + breathing glow behind it */
.cta-wrap{position:relative;display:grid;place-items:center}
.pulse{position:absolute;inset:0;border-radius:999px;border:1.4px solid var(--gold);opacity:0;
  animation:pulseRing 4.2s var(--ease-out) infinite}
.pulse:nth-child(2){animation-delay:1.4s}
.pulse:nth-child(3){animation-delay:2.8s}
@keyframes pulseRing{0%{transform:scale(1);opacity:.5}70%{opacity:.08}100%{transform:scale(1.55);opacity:0}}

.btn-glow{position:absolute;inset:-32px;border-radius:999px;
  background:radial-gradient(circle,rgba(245,185,66,.42),rgba(245,185,66,.08) 45%,transparent 72%);
  filter:blur(11px);animation:glowbreathe 4.6s ease-in-out infinite}
@keyframes glowbreathe{0%,100%{opacity:.7;transform:scale(.94)}50%{opacity:1;transform:scale(1.06)}}

.btn{
  position:relative;overflow:hidden;display:inline-flex;align-items:center;gap:10px;
  padding:15px 27px;border-radius:999px;border:none;cursor:pointer;
  background:linear-gradient(135deg,var(--gold),var(--gold-deep));
  color:#3d2606;font-size:15px;font-weight:700;letter-spacing:.1px;
  box-shadow:0 18px 40px -14px rgba(224,147,46,.65),0 2px 0 rgba(255,255,255,.4) inset;
  animation:btnbreathe 3.6s ease-in-out infinite;
}
@keyframes btnbreathe{0%,100%{transform:scale(1)}50%{transform:scale(1.016)}}
.btn svg{width:18px;height:18px;flex:0 0 auto;animation:iconDrop 3.6s var(--ease-out) infinite}
@keyframes iconDrop{0%,58%{transform:translateY(0)}66%{transform:translateY(2px)}74%,100%{transform:translateY(0)}}

.shimmer{position:absolute;top:0;left:0;width:42%;height:100%;pointer-events:none;
  background:linear-gradient(115deg,transparent,rgba(255,255,255,.7),transparent);
  animation:shimmerSweep 5s linear infinite}
@keyframes shimmerSweep{
  0%,64%{opacity:0;transform:translateX(-170%) skewX(-20deg)}
  68%{opacity:.95}
  84%{opacity:.95;transform:translateX(340%) skewX(-20deg)}
  90%,100%{opacity:0;transform:translateX(340%) skewX(-20deg)}
}

.subline{font-size:11.5px;color:rgba(226,238,250,.55);letter-spacing:.2px;text-align:center}
.subline .dot{color:var(--gold-deep);margin:0 5px}

@media (prefers-reduced-motion:reduce){
  *{animation:none!important}
  .pill .dot::after{display:none}
  .pulse{display:none}
  .btn-glow{opacity:.75;transform:none}
  .btn{transform:none}
  .btn svg{transform:none}
  .shimmer{display:none}
}
</style></head>
<body>
  <div class="stage" role="img" aria-label="Public alpha status pill above a glowing gold Download RaioPDF call to action button, with a GPL-3.0, zero dollar line beneath">

      <g id="rays"><path d="M141.80,95.91 L191.56,91.03 L191.00,86.48 L141.54,93.83 Z" fill="var(--identity-amber)"/><path d="M139.67,86.20 L186.89,69.77 L185.35,65.66 L138.96,84.32 Z" fill="var(--identity-amber-bright)"/><path d="M135.70,77.87 L178.19,51.52 L173.27,44.36 L133.45,74.60 Z" fill="var(--identity-amber)"/><path d="M129.10,69.71 L163.74,33.66 L158.28,28.81 L126.61,67.50 Z" fill="var(--identity-amber-bright)"/><path d="M120.04,63.09 L143.90,19.15 L141.04,17.66 L118.74,62.41 Z" fill="var(--identity-amber)"/><path d="M111.15,59.51 L124.42,11.30 L120.59,10.33 L109.40,59.07 Z" fill="var(--identity-amber-bright)"/><path d="M101.60,58.03 L103.51,8.07 L97.30,8.04 L98.77,58.02 Z" fill="var(--identity-amber)"/><path d="M91.60,58.85 L81.61,9.86 L75.25,11.39 L88.70,59.55 Z" fill="var(--identity-amber-bright)"/><path d="M81.98,62.06 L60.52,16.90 L54.65,19.95 L79.30,63.46 Z" fill="var(--identity-amber)"/><path d="M73.28,67.59 L41.48,29.01 L36.06,33.85 L70.81,69.80 Z" fill="var(--identity-amber-bright)"/><path d="M65.83,75.57 L25.16,46.49 L23.04,49.59 L64.87,76.98 Z" fill="var(--identity-amber)"/><path d="M61.18,83.98 L14.96,64.90 L12.93,70.28 L60.25,86.43 Z" fill="var(--identity-amber-bright)"/><path d="M58.45,93.88 L8.98,86.59 L8.55,89.97 L58.25,95.42 Z" fill="var(--identity-amber)"/><path d="M58.17,103.78 L8.37,108.27 L9.11,114.23 L58.51,106.49 Z" fill="var(--identity-amber-bright)"/><path d="M60.29,113.69 L13.03,129.99 L14.69,134.44 L61.05,115.72 Z" fill="var(--identity-amber)"/><path d="M65.05,123.29 L23.45,151.03 L25.62,154.14 L66.04,124.72 Z" fill="var(--identity-amber-bright)"/><path d="M71.49,130.84 L37.54,167.55 L40.07,169.81 L72.64,131.87 Z" fill="var(--identity-amber)"/><path d="M79.38,136.59 L54.84,180.15 L59.22,182.47 L81.38,137.65 Z" fill="var(--identity-amber-bright)"/><path d="M88.61,140.43 L75.04,188.55 L80.01,189.80 L90.88,141.00 Z" fill="var(--identity-amber)"/><path d="M99.04,141.99 L97.91,191.98 L101.78,191.98 L100.81,141.99 Z" fill="var(--identity-amber-bright)"/><path d="M108.48,141.14 L118.57,190.11 L124.21,188.76 L111.05,140.52 Z" fill="var(--identity-amber)"/><path d="M117.63,138.12 L138.62,183.50 L145.79,179.80 L120.90,136.43 Z" fill="var(--identity-amber-bright)"/><path d="M127.33,131.89 L159.86,169.86 L162.36,167.64 L128.47,130.88 Z" fill="var(--identity-amber)"/><path d="M133.58,125.22 L173.56,155.25 L177.22,150.01 L135.25,122.83 Z" fill="var(--identity-amber-bright)"/><path d="M138.51,116.77 L184.35,136.73 L187.30,129.02 L139.86,113.25 Z" fill="var(--identity-amber)"/><path d="M141.49,106.53 L190.88,114.30 L191.59,108.64 L141.81,103.94 Z" fill="var(--identity-amber-bright)"/></g>
      <g><circle cx="100" cy="100" r="42" fill="none" stroke="var(--primary-deep)" stroke-width="5"/></g>
    </svg>

    <div class="pill"><span class="dot"></span>Public alpha — signed build</div>

    <div class="cta-wrap">
      <span class="pulse"></span><span class="pulse"></span><span class="pulse"></span>
      <div class="btn-glow"></div>
      <button class="btn" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Download RaioPDF</span>
        <span class="shimmer" aria-hidden="true"></span>
      </button>
    </div>

    <div class="subline">GPL-3.0 <span class="dot">·</span> $0</div>
  </div>
</body></html>
